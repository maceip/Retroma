name: Deploy Retroma gallery to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "react/**"
      - ".github/workflows/pages.yml"
  # Allow running manually from the Actions tab.
  workflow_dispatch:

# GitHub Pages deploy requires these permissions on the workflow token.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time — cancel any stale in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build gallery
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: react/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build static gallery
        env:
          # `configure-pages` emits e.g. `/Retroma` for a project page and
          # `/` for a user/org page. Vite's `base` must end with a slash,
          # so we normalise it here.
          BASE_FROM_ACTION: ${{ steps.pages.outputs.base_path }}
        run: |
          RAW="${BASE_FROM_ACTION:-/}"
          case "$RAW" in
            */) VITE_BASE="$RAW" ;;
            *)  VITE_BASE="$RAW/" ;;
          esac
          export VITE_BASE
          echo "VITE_BASE=$VITE_BASE"
          npm run build:gallery

      - name: Add .nojekyll marker
        run: touch dist-gallery/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: react/dist-gallery

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
